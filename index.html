<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Boss Respawn Timer</title>

<style>

/* ===== ROW ===== */
.row{
    position:relative;
    overflow:visible;
    display:grid;
    grid-template-columns: 160px 90px 170px 140px 200px;
    gap:10px;
    padding:10px;
    background:#111;
    border-left:5px solid #333;
    border-radius:10px;
    margin:6px 0;
}

/* ===== GLOW ===== */
.row::after{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:12px;
    opacity:0;
    z-index:-1;
}

/* NEXT */
.next::after{
    box-shadow:0 0 12px #00e5ff,0 0 30px #00e5ff;
    opacity:1;
}

/* ALIVE (GREEN BLINK) */
.alive::after{
    box-shadow:0 0 10px #00ff9c,0 0 25px #00ff9c;
    animation:glowGreen 1s infinite;
}

/* TODAY (YELLOW BLINK) */
.today::after{
    box-shadow:0 0 10px #ffd54f,0 0 25px #ffd54f;
    animation:glowYellow 1.2s infinite;
}

/* SOON (RED BLINK) */
.soon::after{
    box-shadow:0 0 10px #ff4d4d,0 0 25px #ff4d4d;
    animation:glowRed 0.8s infinite;
}

@keyframes glowGreen{
    0%,100%{opacity:0.3;}
    50%{opacity:1;}
}
@keyframes glowYellow{
    0%,100%{opacity:0.3;}
    50%{opacity:1;}
}
@keyframes glowRed{
    0%,100%{opacity:0.3;}
    50%{opacity:1;}
}

/* ===== TEXT ===== */
.name{color:#00e5ff;}
.status.alive{color:#00ff9c;}
.status.today{color:#ffd54f;}
.status.soon{color:#ff4d4d;}
.status.wait{color:#aaa;}

/* ===== INPUT FIX (NO OVERLAP) ===== */
.tod{
    display:flex;
    gap:5px;
}
.tod input{
    flex:1;
    min-width:0;
    background:#000;
    border:1px solid #333;
    color:white;
}
.tod button{
    flex-shrink:0;
    width:60px;
}

/* ===== GLOBAL ===== */
body{
    margin:0;
    background:#0b0e14;
    color:#eee;
    font-family:Segoe UI;
}
.container{
    width:950px;
    margin:auto;
    padding:20px;
}

</style>
</head>

<body>
<div class="container">

<h1>BOSS RESPAWN TIMER</h1>

<div id="dynamic"></div>
<div id="fixed"></div>
<div id="kransia"></div>

</div>

<script>
let bossData={};

// ===== DATA (UNCHANGED) =====
const dynamicBosses=[
{name:"Venatus",h:10},{name:"Viorent",h:10},
{name:"Ego",h:21},{name:"Livera",h:24},
{name:"Araneo",h:24},{name:"Undomiel",h:24},
{name:"LadyDalia",h:18},{name:"GeneralAquleus",h:29},
{name:"Amentis",h:29},{name:"BaronBraudmore",h:32},
{name:"Wannitas",h:48},{name:"Metus",h:48},
{name:"Duplican",h:48},{name:"Shuliar",h:35},
{name:"Gareth",h:32},{name:"Titore",h:37},
{name:"Larba",h:35},{name:"Catena",h:35},
{name:"Secreta",h:62},{name:"Ordo",h:62},
{name:"Asta",h:62},{name:"Supore",h:62}
];

const fixedBosses=[
["Neutro",[["Tuesday","19:00"],["Thursday","11:30"]]],
["Clemantis",[["Monday","11:30"],["Thursday","19:00"]]],
["Saphirus",[["Sunday","17:00"],["Tuesday","11:30"]]],
["Thymele",[["Monday","19:00"],["Wednesday","11:30"]]],
["Auraq",[["Friday","22:00"],["Wednesday","21:00"]]],
["Roderick",[["Friday","19:00"]]],
["Milavy",[["Saturday","15:00"]]],
["Chaiflock",[["Saturday","22:00"]]],
["Benji",[["Sunday","21:00"]]],
["Libitina",[["Monday","21:00"],["Saturday","21:00"]]],
["Rakajeth",[["Tuesday","22:00"],["Sunday","19:00"]]],
["Tumier",[["Sunday","19:00"]]]
];

const DAY_MAP={Sunday:0,Monday:1,Tuesday:2,Wednesday:3,Thursday:4,Friday:5,Saturday:6};

// ===== CALC =====
function nextSchedule(times){
let now=new Date();

let next = times.map(([day,t])=>{
    let[h,m]=t.split(":");
    let d=new Date();
    let diff=DAY_MAP[day]-d.getDay();
    if(diff<0) diff+=7;
    d.setDate(d.getDate()+diff);
    d.setHours(h,m,0,0);
    return d;
}).sort((a,b)=>a-b)[0];

return next;
}

function format(d){
return d?d.toLocaleString("en-US",{weekday:"short",hour:"2-digit",minute:"2-digit"}):"--";
}

function cd(n){
if(!n)return"--";
let diff=(n-new Date())/1000;
if(diff<=0)return"WAIT"; // FIXED
let h=Math.floor(diff/3600);
let m=Math.floor(diff%3600/60);
let s=Math.floor(diff%60);
return`${h}h ${m}m ${s}s`;
}

// ===== BUILD =====
function build(data,container){
data.forEach(b=>{
let row=document.createElement("div");
row.className="row";
row.id="row_"+b.name;

row.innerHTML=`
<div class="name">${b.name}</div>
<div id="s_${b.name}">--</div>
<div id="r_${b.name}">--</div>
<div id="c_${b.name}">--</div>
<div class="tod">
<input id="tod_${b.name}">
<button onclick="setNow('${b.name}')">Now</button>
</div>
`;
container.appendChild(row);
});
}

build(dynamicBosses,dynamic);
build(fixedBosses.map(([n])=>({name:n})),fixed);

// ===== UPDATE =====
function update(){

let all=[];

[...dynamicBosses.map(b=>({...b,type:"dyn"})),
...fixedBosses.map(([n,t])=>({name:n,times:t,type:"fix"}))]

.forEach(b=>{

let n = b.type==="dyn"?null:nextSchedule(b.times);

if(n) all.push({name:b.name,time:n});

let row=document.getElementById("row_"+b.name);
row.className="row";

let diff=n?(n-new Date())/1000:null;
let status="WAIT";

if(n){
if(diff<=0){status="WAIT";} // FIXED
else if(diff<=300){status="SOON";row.classList.add("soon");}
else if(n.getDay()===new Date().getDay()){status="TODAY";row.classList.add("today");}
}

document.getElementById("s_"+b.name).innerText=status;
document.getElementById("s_"+b.name).className="status "+status.toLowerCase();
document.getElementById("r_"+b.name).innerText=format(n);
document.getElementById("c_"+b.name).innerText=cd(n);

});

// NEXT
all.sort((a,b)=>a.time-b.time);
if(all.length){
document.getElementById("row_"+all[0].name).classList.add("next");
}
}

setInterval(update,1000);
</script>

</body>
</html>
